<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luar Talian — SK Darau</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(160deg,#1e3a8a,#0f172a);color:#fff;text-align:center;padding:24px}
    .box{max-width:380px}
    img{width:92px;height:92px;border-radius:20px;object-fit:cover;
      box-shadow:0 12px 36px rgba(0,0,0,.45);margin-bottom:22px}
    h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
    p{color:#cbd5e1;font-size:14.5px;line-height:1.6;margin-top:10px}
    button{margin-top:24px;background:#d4af37;color:#0f172a;border:none;font-weight:800;
      font-size:15px;padding:12px 28px;border-radius:999px;cursor:pointer}
    button:hover{filter:brightness(1.08)}
  </style>
</head>
<body>
  <div class="box">
    <img src="/logo-sekolah.jpg" alt="SK Darau" />
    <h1>Anda Luar Talian</h1>
    <p>Tiada sambungan internet. Sila semak rangkaian anda dan cuba lagi.</p>
    <button onclick="location.reload()">Cuba Semula</button>
  </div>
</body>
</html>
